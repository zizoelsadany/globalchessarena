<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#8b5e24" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Chess Arena" />
    
    <!-- Primary SEO Metadata -->
    <title>Global Chess Arena - Play, Learn & Compete Online</title>
    <meta name="description" content="Global Chess Arena - The ultimate online chess platform. Play real-time multiplayer chess, solve puzzles, join tournaments, analyze games with AI, and track your global rank." />
    <meta name="keywords" content="chess, global chess arena, play chess, online chess, multiplayer chess, chess game, chess tournament, chess puzzles, AI chess coach, chess analysis, chess community" />
    <meta name="author" content="Abd Elaziz Elsadany" />
    <link rel="canonical" href="https://globalchessarena.com/" />

    <!-- Crawler Instructions for Global Search Engines -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="yandex" content="index, follow" />
    <meta name="baiduspider" content="index, follow" />

    <!-- Global Search Engine Verification Meta Tags (Replace with your actual keys) -->
    <!-- Google Search Console -->
    <meta name="google-site-verification" content="google_verification_placeholder" />
    <!-- Microsoft Bing Webmaster Tools -->
    <meta name="msvalidate.01" content="bing_verification_placeholder" />
    <!-- Yandex Webmaster -->
    <meta name="yandex-verification" content="yandex_verification_placeholder" />
    <!-- Baidu Webmaster -->
    <meta name="baidu-site-verification" content="baidu_verification_placeholder" />

    <!-- Open Graph / Facebook (Visual display in search engines & social shares) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Global Chess Arena - Play, Learn & Compete Online" />
    <meta property="og:description" content="Join the ultimate online chess platform. Play real-time multiplayer chess, solve puzzles, join tournaments, and analyze games with AI." />
    <meta property="og:url" content="https://globalchessarena.com/" />
    <meta property="og:image" content="https://globalchessarena.com/gold_pieces.png" />
    <meta property="og:site_name" content="Global Chess Arena" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Global Chess Arena - Play, Learn & Compete Online" />
    <meta name="twitter:description" content="Join the ultimate online chess platform. Play real-time multiplayer chess, solve puzzles, join tournaments, and analyze games with AI." />
    <meta name="twitter:image" content="https://globalchessarena.com/gold_pieces.png" />

    <!-- JSON-LD Structured Data for Search Engines Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Global Chess Arena",
        "url": "https://globalchessarena.com/",
        "description": "Play chess online against global players, participate in tournaments, solve challenging puzzles, and level up your game with our AI chess coach.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://globalchessarena.com/matchmaking?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Game",
        "name": "Global Chess Arena",
        "description": "An interactive multiplayer online chess game platform.",
        "genre": "Strategy",
        "playMode": "MultiPlayer",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
